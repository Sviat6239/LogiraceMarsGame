<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>LogiRaceMarsGame</title>
    <link rel="stylesheet" href="./static/style/styles.css">
</head>

<body>

    <div class="inventoryPanel">

        <div class="leftSide">
            <div class="locationInventory"></div>
        </div>

        <div class="rightSide">
            <div class="playerInventory"></div>
        </div>

    </div>

    <div class="optionPanel">
        <h1>Options</h1>
    </div>


    <div class="controlPanelRow">

        <div class="tools">
            <h1 class="Tools">Tools</h1>
            <div class="inventoryBtn">🗃️</div>
        </div>

        <div class="controlPanel">
            <h1 class="location">location</h1>
            <h2 class="description">decsription</h2>
            <div class="moveBtn">
            </div>
            <div class="messages">
                <div class="dialogueMessage">
                </div>
                <div class="controlButtons">
                </div>
            </div>
        </div>

        <div class="mapPanel">
            <h1 class="mapText">Map</h1>
        </div>
    </div>



</body>
<script type="module" src="static/script/index.js"></script>

</html>
